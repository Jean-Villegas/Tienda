<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexStore - Escritorio de Emprendedor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <div class="app-container">
        <header class="vendor-header animate-in">
            <div class="logo" style="color: white;">Nex<span>Seller</span></div>
            <h1>Panel de Control</h1>
            <p>Hola, Emprendedor. Publica tus productos aquí.</p>
        </header>

        <main id="app-content" class="animate-in" style="padding: 20px;">
            <section class="vendor-dashboard">
                <div class="section-header">
                    <h3>Crear Nuevo Anuncio</h3>
                </div>

                <form id="add-product-form" class="auth-form">
                    <div class="upload-area">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Toca para subir fotos del producto</p>
                        <input type="file" id="prod-img" hidden>
                    </div>

                    <div class="form-group">
                        <label>Título del Producto</label>
                        <input type="text" id="prod-title" placeholder="Ej: Pizza Artesanal" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Precio ($)</label>
                            <input type="number" id="prod-price" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label>Categoría</label>
                            <select id="prod-cat" required>
                                <option value="comida">Comida</option>
                                <option value="moda">Moda</option>
                                <option value="servicios">Servicios</option>
                                <option value="tech">Tech</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="prod-desc" rows="4" placeholder="Describe tu producto..." required></textarea>
                    </div>

                    <button type="submit" class="btn-vendor">
                        Publicar Anuncio <i class="fa-solid fa-rocket"></i>
                    </button>

                    <button type="button" class="btn-checkout"
                        style="background-color: transparent; border: 1px solid #e2e8f0; color: var(--text-muted); margin-top: 10px;"
                        onclick="window.location.href='index.html'">
                        Volver a la Tienda
                    </button>
                </form>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('add-product-form');

            form.onsubmit = (e) => {
                e.preventDefault();
                alert('¡Felicidades! Tu anuncio ha sido enviado a revisión por el administrador.');
                window.location.href = 'index.html';
            };

            document.querySelector('.upload-area').onclick = () => {
                document.getElementById('prod-img').click();
            };
        });
    </script>
</body>

</html>
